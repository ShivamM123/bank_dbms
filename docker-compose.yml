services:
  # ─────────────────────────────────────────────
  # MySQL – single instance, exposed on 3307
  # The backend uses port 3307 hardcoded for the
  # Recovery / Crash Lab, so we map 3307→3306.
  # ─────────────────────────────────────────────
  bank-crash-db:
    image: mysql:8.0
    container_name: bank-crash-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bank_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Node.js Backend
  # ─────────────────────────────────────────────
  backend:
    build: ./bank-backend
    container_name: bank-backend
    restart: unless-stopped
    depends_on:
      bank-crash-db:
        condition: service_healthy
    environment:
      DB_HOST: bank-crash-db
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: bank_db
      PORT: 5000
      # Inside Docker the MySQL container exposes 3306, not 3307
      DB_PORT_CRASH: 3306
    ports:
      - "5000:5000"
    # Mount the Docker socket so the backend can run
    # "docker kill / docker start bank-crash-db" for the Recovery Lab
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ─────────────────────────────────────────────
  # React / Vite Frontend
  # ─────────────────────────────────────────────
  frontend:
    build: ./bank-frontend
    container_name: bank-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
